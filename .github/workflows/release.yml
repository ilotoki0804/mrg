name: Release to PyPI

permissions:
  contents: write

on:
  push:
    branches:
      - release

jobs:
  release-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: install dependencies
        run: |
          uv sync

      - name: build and publish package
        run: |
          uv build
          uv publish -u __token__ -p "${{ secrets.PYPI_TOKEN }}"

      - name: get package version
        id: pkg_version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg_version.outputs.version }}
          name: v${{ steps.pkg_version.outputs.version }}
          generate_release_notes: true

      - name: notify homebrew-mrg
        env:
          HOMEBREW_MRG_DISPATCH_TOKEN: ${{ secrets.HOMEBREW_MRG_DISPATCH_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HOMEBREW_MRG_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ilotoki0804/homebrew-mrg/dispatches \
            -d '{"event_type":"mrg_released"}'
